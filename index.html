<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Signalisation PRO</title>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}

h1 {
  color: #ff6600;
}

.card {
  background: white;
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
  display: inline-block;
  width: 200px;
  vertical-align: top;
  box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

.card img {
  width: 100%;
  height: 120px;
  object-fit: contain;
}

button {
  background: #ff6600;
  color: white;
  border: none;
  padding: 5px 10px;
  cursor: pointer;
}

select, input {
  margin-top: 5px;
}
</style>

</head>

<body>

<h1>🚧 Gestion Signalisation PRO</h1>

<input id="search" placeholder="Recherche..." oninput="render()" />

<select id="filterType" onchange="render()">
  <option value="">Type</option>
  <option value="Danger">Danger</option>
  <option value="Information">Information</option>
</select>

<select id="filterColor" onchange="render()">
  <option value="">Couleur</option>
  <option value="orange">Orange</option>
  <option value="jaune">Jaune</option>
</select>

<div id="list"></div>

<h2>Commande</h2>
<div id="commande"></div>

<button onclick="generatePDF()">Générer PDF</button>

<script>
const { jsPDF } = window.jspdf;

const DATA = [
  {
    nom: "Travaux en cours",
    type: "Danger",
    couleur: "orange",
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/W20-1.svg/200px-W20-1.svg.png",
    dimensions: ["300x300","600x600","900x900"]
  },
  {
    nom: "Déviation",
    type: "Information",
    couleur: "jaune",
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/5f/Wa-23.svg/200px-Wa-23.svg.png",
    dimensions: ["600x600","900x900"]
  }
];

let commande = [];

function render() {
  const search = document.getElementById("search").value.toLowerCase();
  const type = document.getElementById("filterType").value;
  const color = document.getElementById("filterColor").value;

  const list = document.getElementById("list");
  list.innerHTML = "";

  DATA
    .filter(i =>
      i.nom.toLowerCase().includes(search) &&
      (!type || i.type === type) &&
      (!color || i.couleur === color)
    )
    .forEach(item => {

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="${item.image}" />
        <b>${item.nom}</b><br>
        <small>${item.type}</small><br>

        <select id="dim-${item.nom}">
          ${item.dimensions.map(d => `<option>${d}</option>`).join("")}
        </select>

        <input type="number" id="qty-${item.nom}" value="1" min="1" />

        <button onclick="addItem('${item.nom}')">Ajouter</button>
      `;

      list.appendChild(div);
    });
}

function addItem(nom) {
  const item = DATA.find(i => i.nom === nom);
  const dimension = document.getElementById(`dim-${nom}`).value;
  const quantite = document.getElementById(`qty-${nom}`).value;

  commande.push({ ...item, dimension, quantite });
  renderCommande();
}

function renderCommande() {
  const div = document.getElementById("commande");
  div.innerHTML = "";

  commande.forEach(i => {
    div.innerHTML += `
      ${i.nom} - ${i.dimension} - Qté: ${i.quantite}<br>
    `;
  });
}

function generatePDF() {
  const doc = new jsPDF();

  doc.text("Commande chantier", 10, 10);

  let y = 20;

  commande.forEach(i => {
    doc.text(`${i.nom}`, 10, y);
    doc.text(`Dim: ${i.dimension}`, 80, y);
    doc.text(`Qté: ${i.quantite}`, 140, y);
    y += 10;
  });

  doc.save("commande.pdf");
}

render();
</script>

</body>
</html>
